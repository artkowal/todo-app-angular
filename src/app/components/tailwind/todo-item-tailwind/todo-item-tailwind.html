<div class="min-h-[85px] flex items-center gap-3 sm:gap-5 bg-surface dark:bg-surface-dark border border-outline-light dark:border-outline-dark rounded-xl p-3 sm:p-4 mb-3 transition-all duration-200 shadow-sm"
     [ngClass]="{'bg-gray-50 dark:bg-[#181818] opacity-80': todo.completed}"
>
      
    <div class="shrink-0">
        <input 
          type="checkbox" 
          [checked]="todo.completed" 
          (change)="onToggle()"
          class="w-5 h-5 cursor-pointer accent-brand-500 text-brand-500 border-gray-300 dark:border-gray-600 rounded focus:ring-brand-500"
        >
    </div>

    <img 
      [src]="'https://picsum.photos/seed/' + todo.id + '/400/225'" 
      alt="Miniaturka zadania"
      class="w-12 sm:w-24 rounded-lg shadow-sm shrink-0 aspect-square sm:aspect-video object-cover transition-all duration-300"
      [ngClass]="{'grayscale opacity-50': todo.completed}"
    >

    <div class="flex-grow min-w-0">
        <h5 
          class="m-0 mb-1 text-fluid-body font-semibold text-gray-800 dark:text-gray-100 transition-colors truncate"
          [ngClass]="{'line-through text-gray-400 dark:text-gray-500': todo.completed}"
        >
          {{ todo.title }}
        </h5>
        <p class="m-0 text-fluid-small text-gray-400 dark:text-gray-500 truncate" *ngIf="todo.description">
          {{ todo.description }}
        </p>
    </div>

    <div class="flex items-center gap-3 sm:gap-5 shrink-0">
        <div class="hidden sm:flex flex-col items-end gap-1.5">
          <span 
            *ngIf="todo.priority" 
            class="text-fluid-small px-2.5 py-0.5 rounded-full font-medium"
            [ngClass]="todo.priority === 'Wysoki' ? 'bg-red-100 dark:bg-red-900/30 text-red-500 dark:text-red-400 border border-red-200 dark:border-red-800' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700'"
          >
            {{ todo.priority }}
          </span>
          <span class="text-fluid-small text-gray-400 dark:text-gray-500">
            {{ todo.createdAt | date:'dd.MM.yyyy' }}
          </span>
        </div>
        
        <div class="flex gap-1 sm:gap-2">
          <button (click)="onEdit()" aria-label="Edytuj zadanie" class="p-2 text-gray-400 bg-transparent border-none rounded-lg cursor-pointer transition-colors hover:text-brand-500 hover:bg-brand-50 dark:hover:bg-surface-hover flex items-center justify-center">
            <mat-icon class="text-[20px] w-[20px] h-[20px]">edit</mat-icon>
          </button>

          <button (click)="onDelete()" aria-label="Usuń zadanie" class="p-2 text-gray-400 bg-transparent border-none rounded-lg cursor-pointer transition-colors hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center justify-center">
            <mat-icon class="text-[20px] w-[20px] h-[20px]">delete</mat-icon>
          </button>
        </div>
    </div>
</div>
