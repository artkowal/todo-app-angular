<div class="modal-backdrop" *ngIf="isOpen" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2>{{ isEditMode ? 'Edytuj zadanie' : 'Dodaj nowe zadanie' }}</h2>
      <button class="close-btn" (click)="closeModal()">✕</button>
    </header>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Tytuł zadania</label>
        <input type="text" name="title" [(ngModel)]="title" required placeholder="np. Zaprojektować bazę danych">
      </div>

      <div class="form-group">
        <label>Data wykonania</label>
        <input type="date" name="date" [(ngModel)]="selectedDate" required>
      </div>

      <div class="form-group">
        <label>Opis (opcjonalnie)</label>
        <textarea name="desc" [(ngModel)]="description" rows="3" placeholder="Dodatkowe informacje..."></textarea>
      </div>

      <div class="form-group">
        <label>Priorytet</label>
        <select name="priority" [(ngModel)]="priority">
          <option value="Niski">Niski</option>
          <option value="Średni">Średni</option>
          <option value="Wysoki">Wysoki</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" class="cancel-btn" (click)="closeModal()">Anuluj</button>
        <button type="submit" class="save-btn" [disabled]="!title.trim() || !selectedDate">
          {{ isEditMode ? 'Zapisz zmiany' : 'Utwórz zadanie' }}
        </button>
      </div>
    </form>
  </div>
</div>
