<div class="filters">
      <button [class.active]="currentFilter() === 'all'" (click)="setFilter('all')">Wszystkie</button>
      <button [class.active]="currentFilter() === 'active'" (click)="setFilter('active')">Aktywne</button>
      <button [class.active]="currentFilter() === 'completed'" (click)="setFilter('completed')">Ukończone</button>
</div>
